<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Linoir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/checkout.css">
</head>
<body class="checkout-page">

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header class="checkout-header">
    <div class="container">
      <a href="./index.html" class="checkout-logo">Linoir</a>
      <a href="javascript:history.back()" class="checkout-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back
      </a>
    </div>
  </header>

  <!-- ── Body ────────────────────────────────────────────────────────────── -->
  <main class="checkout-body">
    <div class="container">
      <div class="checkout-grid">

        <!-- ── Left: Form ───────────────────────────────────────────────── -->
        <div class="checkout-form-panel">

          <!-- Contact -->
          <div class="checkout-section">
            <h2 class="checkout-section-title">
              <span>1</span> Contact Information
            </h2>
            <div class="form-row">
              <div class="form-group">
                <label>First Name</label>
                <input type="text" id="firstName" placeholder="Hamza" autocomplete="given-name">
              </div>
              <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="lastName" placeholder="Khalid" autocomplete="family-name">
              </div>
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" id="email" placeholder="hamza@email.com" autocomplete="email">
            </div>
            <div class="form-group">
              <label>Phone Number</label>
              <input type="tel" id="phone" placeholder="+92 300 0000000" autocomplete="tel">
            </div>
          </div>

          <!-- Shipping -->
          <div class="checkout-section">
            <h2 class="checkout-section-title">
              <span>2</span> Shipping Address
            </h2>
            <div class="form-group">
              <label>Street Address</label>
              <input type="text" id="address" placeholder="House #, Street, Area" autocomplete="street-address">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>City</label>
                <input type="text" id="city" placeholder="Islamabad" autocomplete="address-level2">
              </div>
              <div class="form-group">
                <label>Province</label>
                <select id="province" autocomplete="address-level1">
                  <option value="">Select Province</option>
                  <option>Punjab</option>
                  <option>Sindh</option>
                  <option>KPK</option>
                  <option>Balochistan</option>
                  <option>Islamabad (ICT)</option>
                  <option>AJK</option>
                  <option>Gilgit-Baltistan</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label>Postal Code</label>
              <input type="text" id="postal" placeholder="44000" autocomplete="postal-code">
            </div>
            <div class="form-group">
              <label>Order Notes (Optional)</label>
              <textarea id="notes" placeholder="Any special instructions for delivery..."></textarea>
            </div>
          </div>

          <!-- Payment -->
          <div class="checkout-section">
            <h2 class="checkout-section-title">
              <span>3</span> Payment Method
            </h2>
            <div class="payment-methods">

              <label class="payment-option selected" id="codOption">
                <input type="radio" name="payment" value="cod" checked onchange="handlePaymentChange(this)">
                <div class="payment-option-label">
                  <strong>Cash on Delivery</strong>
                  <span>Pay when your order arrives</span>
                </div>
                <div class="payment-option-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M2 10h20"/></svg>
                </div>
              </label>

              <label class="payment-option" id="cardOption">
                <input type="radio" name="payment" value="card" onchange="handlePaymentChange(this)">
                <div class="payment-option-label">
                  <strong>Credit / Debit Card</strong>
                  <span>Visa, Mastercard, UnionPay</span>
                </div>
                <div class="payment-option-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                </div>
              </label>

              <!-- Card fields (hidden by default) -->
              <div class="card-fields" id="cardFields">
                <div class="form-group">
                  <label>Card Number</label>
                  <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19">
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label>Expiry Date</label>
                    <input type="text" id="cardExpiry" placeholder="MM / YY" maxlength="7">
                  </div>
                  <div class="form-group">
                    <label>CVV</label>
                    <input type="text" id="cardCvv" placeholder="123" maxlength="4">
                  </div>
                </div>
                <div class="form-group">
                  <label>Name on Card</label>
                  <input type="text" id="cardName" placeholder="Hamza Khalid">
                </div>
              </div>

              <label class="payment-option" id="easyOption">
                <input type="radio" name="payment" value="easypaisa" onchange="handlePaymentChange(this)">
                <div class="payment-option-label">
                  <strong>EasyPaisa / JazzCash</strong>
                  <span>Mobile wallet payment</span>
                </div>
                <div class="payment-option-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
                </div>
              </label>

            </div>
          </div>

        </div>

        <!-- ── Right: Summary ───────────────────────────────────────────── -->
        <div class="checkout-summary-panel">
          <div class="summary-card">

            <div class="summary-header">
              <h2>Order Summary</h2>
            </div>

            <!-- Items -->
            <div class="summary-items" id="summaryItems">
              <div style="text-align:center;padding:32px 0;color:var(--text-light);font-size:13px;">
                Your cart is empty
              </div>
            </div>

            <!-- Promo -->
            <div class="promo-section">
              <div class="promo-input-wrap">
                <input type="text" id="promoInput" placeholder="Promo code">
                <button class="promo-apply-btn" onclick="applyPromo()">Apply</button>
              </div>
              <p class="promo-message" id="promoMessage"></p>
            </div>

            <!-- Totals -->
            <div class="summary-totals">
              <div class="summary-row">
                <span>Subtotal</span>
                <span id="subtotalAmount">PKR 0</span>
              </div>
              <div class="summary-row">
                <span>Shipping</span>
                <span id="shippingAmount">PKR 200</span>
              </div>
              <div class="summary-row" id="discountRow" style="display:none;">
                <span>Discount</span>
                <span id="discountAmount" style="color:var(--success);">-PKR 0</span>
              </div>
              <div class="summary-row total">
                <span>Total</span>
                <span id="totalAmount">PKR 200</span>
              </div>
            </div>

            <!-- Place Order -->
            <div class="summary-footer">
              <button class="place-order-btn" id="placeOrderBtn" onclick="placeOrder()">
                Place Order
              </button>
              <p class="secure-note">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                Secure checkout
              </p>
            </div>

          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="./js/cart.js"></script>
  <script>
    const SHIPPING_FEE = 200;
    const FREE_SHIPPING_THRESHOLD = 3000;
    const PROMO_CODES = { 'LINOIR10': 10, 'WELCOME20': 20 };
    let discountPercent = 0;

    // ── Render Summary ──────────────────────────────────────────────────────
    function renderSummary() {
      const cart = Cart.getCart();
      const subtotal = Cart.getTotal();
      const shipping = subtotal >= FREE_SHIPPING_THRESHOLD ? 0 : SHIPPING_FEE;
      const discountAmount = Math.round(subtotal * discountPercent / 100);
      const total = subtotal + shipping - discountAmount;

      // Items
      const itemsEl = document.getElementById('summaryItems');
      if (cart.length === 0) {
        itemsEl.innerHTML = `<div style="text-align:center;padding:32px 0;color:var(--text-light);font-size:13px;">Your cart is empty</div>`;
      } else {
        itemsEl.innerHTML = cart.map(item => `
          <div class="summary-item">
            <div class="summary-item-img-wrap">
              <img src="${item.image}" alt="${item.name}" class="summary-item-img" onerror="this.src='./assets/images/placeholder.png'">
              <span class="summary-item-qty">${item.qty}</span>
            </div>
            <div class="summary-item-info">
              <p class="summary-item-name">${item.name}</p>
              <p class="summary-item-meta">${item.size} · ${item.color}</p>
            </div>
            <span class="summary-item-price">PKR ${(item.price * item.qty).toLocaleString()}</span>
          </div>
        `).join('');
      }

      // Totals
      document.getElementById('subtotalAmount').textContent = `PKR ${subtotal.toLocaleString()}`;
      document.getElementById('shippingAmount').innerHTML = shipping === 0
        ? `<span class="free-shipping">Free</span>`
        : `PKR ${shipping.toLocaleString()}`;
      document.getElementById('totalAmount').textContent = `PKR ${total.toLocaleString()}`;

      // Discount row
      const discountRow = document.getElementById('discountRow');
      if (discountPercent > 0) {
        discountRow.style.display = 'flex';
        document.getElementById('discountAmount').textContent = `-PKR ${discountAmount.toLocaleString()}`;
      } else {
        discountRow.style.display = 'none';
      }

      // Disable place order if cart empty
      document.getElementById('placeOrderBtn').disabled = cart.length === 0;
    }

    // ── Payment Toggle ──────────────────────────────────────────────────────
    function handlePaymentChange(radio) {
      document.querySelectorAll('.payment-option').forEach(el => el.classList.remove('selected'));
      radio.closest('.payment-option').classList.add('selected');

      const cardFields = document.getElementById('cardFields');
      cardFields.classList.toggle('visible', radio.value === 'card');
    }

    // Card number formatting
    document.getElementById('cardNumber')?.addEventListener('input', function() {
      this.value = this.value.replace(/\D/g, '').replace(/(.{4})/g, '$1 ').trim().slice(0, 19);
    });

    document.getElementById('cardExpiry')?.addEventListener('input', function() {
      this.value = this.value.replace(/\D/g, '').replace(/^(\d{2})(\d)/, '$1 / $2').slice(0, 7);
    });

    // ── Promo Code ──────────────────────────────────────────────────────────
    function applyPromo() {
      const code = document.getElementById('promoInput').value.trim().toUpperCase();
      const msgEl = document.getElementById('promoMessage');

      if (PROMO_CODES[code]) {
        discountPercent = PROMO_CODES[code];
        msgEl.className = 'promo-message success';
        msgEl.textContent = `✓ ${discountPercent}% discount applied!`;
        renderSummary();
      } else {
        msgEl.className = 'promo-message error';
        msgEl.textContent = 'Invalid promo code.';
      }
    }

    // ── Validation ──────────────────────────────────────────────────────────
    function validate() {
      const fields = [
        { id: 'firstName', label: 'First name' },
        { id: 'lastName', label: 'Last name' },
        { id: 'email', label: 'Email' },
        { id: 'phone', label: 'Phone number' },
        { id: 'address', label: 'Address' },
        { id: 'city', label: 'City' },
        { id: 'province', label: 'Province' },
      ];

      for (const f of fields) {
        const el = document.getElementById(f.id);
        if (!el.value.trim()) {
          el.focus();
          el.style.borderColor = 'var(--error)';
          setTimeout(() => el.style.borderColor = '', 2000);
          Cart.showToast(`Please enter your ${f.label}`, 'error');
          return false;
        }
      }

      const email = document.getElementById('email').value;
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        Cart.showToast('Please enter a valid email address', 'error');
        return false;
      }

      const payment = document.querySelector('input[name="payment"]:checked').value;
      if (payment === 'card') {
        const cardNum = document.getElementById('cardNumber').value.replace(/\s/g, '');
        if (cardNum.length < 16) {
          Cart.showToast('Please enter a valid card number', 'error');
          return false;
        }
      }

      return true;
    }

    // ── Place Order ─────────────────────────────────────────────────────────
    function placeOrder() {
      if (!validate()) return;

      const btn = document.getElementById('placeOrderBtn');
      btn.textContent = 'Processing...';
      btn.disabled = true;

      // Simulate order processing
      setTimeout(() => {
        const orderId = 'LNR-' + Date.now().toString().slice(-6);
        const subtotal = Cart.getTotal();
        const shipping = subtotal >= FREE_SHIPPING_THRESHOLD ? 0 : SHIPPING_FEE;
        const discountAmount = Math.round(subtotal * discountPercent / 100);
        const total = subtotal + shipping - discountAmount;

        const order = {
          id: orderId,
          date: new Date().toLocaleDateString('en-PK', { year: 'numeric', month: 'long', day: 'numeric' }),
          items: Cart.getCart(),
          customer: {
            name: `${document.getElementById('firstName').value} ${document.getElementById('lastName').value}`,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            address: `${document.getElementById('address').value}, ${document.getElementById('city').value}, ${document.getElementById('province').value}`,
          },
          payment: document.querySelector('input[name="payment"]:checked').value,
          subtotal,
          shipping,
          discount: discountAmount,
          total,
        };

        // Save order to localStorage
        localStorage.setItem('linoir_last_order', JSON.stringify(order));

        // Clear cart
        Cart.clearCart();

        // Redirect to confirmation
        window.location.href = './order-confirmation.html';
      }, 1500);
    }

    // Init
    renderSummary();
  </script>
</body>
</html>
